# --- Regex Patterns ---
# For more complex matching. Python re syntax, case-insensitive.
regex_patterns:
  - "\\bAI\\b"  # standalone "AI" not inside other words
  - "\\bML\\b"
  - "\\balgorithm(?:ic|s)?\\b"
  - "\\bautomated?\\s+(?:decision|system|tool|eligibility)"
  - "\\brisk\\s+(?:assessment|score|tool)"
  - "\\bdata\\s+(?:sharing|governance|privacy|protection)"
  - "\\bcommunity\\s+(?:input|voice|oversight|accountability|power)"
  - "\\b(?:child|family)\\s+welfare"
  - "\\bbehavioral\\s+health"
  - "\\bhomeless(?:ness)?\\s+(?:service|system|outreach)"
