# keywords.yaml
# Keyword and regex lists for Stage S05 deterministic filtering.
# These add positive signal to documents. They do NOT discard non-matching docs.
# Organized by research domain. Case-insensitive matching.

# --- Primary Research Domains ---

ai_governance:
  description: "Terms related to AI, algorithmic decision-making, and technology governance"
  keywords:
    - "artificial intelligence"
    - "machine learning"
    - "predictive analytics"
    - "algorithmic"
    - "algorithm"
    - "automated decision"
    - "decision support"
    - "risk assessment"
    - "COMPAS"
    - "pretrial risk"  # flagging even if out of scope, to track boundary
    - "technology directive"
    - "TD 24-04"
    - "GenAI"
    - "generative AI"
    - "governance board"
    - "chief information officer"
    - "CIO"
    - "CISO"
    - "chief privacy officer"
    - "data governance"
    - "facial recognition"
    - "surveillance"
    - "automated eligibility"
    - "benefits automation"
    - "triage tool"
    - "matching algorithm"
    - "HMIS"  # homeless management information system
    - "coordinated entry"
    - "decision lens"

